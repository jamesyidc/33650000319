<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试10分钟上涨占比柱状图</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        #chartContainer {
            width: 100%;
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .stat-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            border-radius: 4px;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 测试10分钟上涨占比柱状图</h1>
        
        <div class="info">
            <strong>测试日期:</strong> <span id="testDate">-</span><br>
            <strong>数据点数:</strong> <span id="dataCount">-</span><br>
            <strong>API状态:</strong> <span id="apiStatus">加载中...</span>
        </div>
        
        <div id="chartContainer"></div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">平均值</div>
                <div class="stat-value" id="avgValue">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最大值</div>
                <div class="stat-value" id="maxValue">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最小值</div>
                <div class="stat-value" id="minValue">--</div>
            </div>
        </div>
        
        <div class="info" style="margin-top: 20px;">
            <strong>控制台日志:</strong>
            <pre id="console"></pre>
        </div>
    </div>

    <script>
        // 自定义console.log来显示在页面上
        const consoleDiv = document.getElementById('console');
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            consoleDiv.textContent += args.join(' ') + '\n';
        };

        // 获取今天日期（格式：YYYYMMDD）
        function getTodayDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}${month}${day}`;
        }

        // 初始化图表
        const chart = echarts.init(document.getElementById('chartContainer'));
        console.log('📊 ECharts实例已创建');

        // 加载数据并渲染图表
        async function loadAndRenderChart() {
            try {
                const dateStr = getTodayDate();
                document.getElementById('testDate').textContent = dateStr;
                console.log(`📡 开始加载数据，日期: ${dateStr}`);
                
                const apiUrl = `/api/coin-change-tracker/aggregated/10min_up_ratio?date=${dateStr}&_t=${Date.now()}`;
                console.log(`📡 API URL: ${apiUrl}`);
                
                const response = await fetch(apiUrl);
                console.log(`📡 API响应状态: ${response.status}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const result = await response.json();
                console.log(`📊 API返回成功: ${result.success}`);
                console.log(`📊 数据点数: ${result.data ? result.data.length : 0}`);
                
                if (!result.success || !result.data || result.data.length === 0) {
                    document.getElementById('apiStatus').textContent = '❌ 数据为空';
                    console.error('❌ 数据为空或加载失败');
                    return;
                }
                
                document.getElementById('apiStatus').textContent = '✅ 加载成功';
                document.getElementById('dataCount').textContent = result.data.length;
                
                // 处理数据
                const timeLabels = [];
                const barData = [];
                
                result.data.forEach(item => {
                    timeLabels.push(item.time_range);
                    barData.push({
                        value: parseFloat(item.avg_up_ratio).toFixed(2),
                        itemStyle: {
                            color: getColor(item.color)
                        }
                    });
                });
                
                console.log(`📊 时间标签: ${timeLabels.slice(0, 5).join(', ')}...`);
                console.log(`📊 柱状图数据: ${barData.slice(0, 5).map(d => d.value).join(', ')}...`);
                
                // 计算统计值
                const values = barData.map(d => parseFloat(d.value));
                const avg = (values.reduce((a, b) => a + b, 0) / values.length).toFixed(2);
                const max = Math.max(...values).toFixed(2);
                const min = Math.min(...values).toFixed(2);
                
                document.getElementById('avgValue').textContent = `${avg}%`;
                document.getElementById('maxValue').textContent = `${max}%`;
                document.getElementById('minValue').textContent = `${min}%`;
                
                // 渲染图表
                const option = {
                    title: {
                        text: '10分钟上涨占比平均值',
                        left: 'center'
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'shadow'
                        }
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '15%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: timeLabels,
                        axisLabel: {
                            rotate: 45,
                            interval: Math.floor(timeLabels.length / 24)
                        }
                    },
                    yAxis: {
                        type: 'value',
                        name: '上涨占比 (%)',
                        axisLabel: {
                            formatter: '{value}%'
                        }
                    },
                    series: [{
                        name: '上涨占比',
                        type: 'bar',
                        data: barData,
                        markLine: {
                            data: [
                                { yAxis: 55, lineStyle: { color: '#10b981', type: 'dashed' }, label: { formatter: '55%' } },
                                { yAxis: 45, lineStyle: { color: '#f59e0b', type: 'dashed' }, label: { formatter: '45%' } }
                            ]
                        }
                    }]
                };
                
                chart.setOption(option);
                console.log('✅ 图表渲染完成');
                
            } catch (error) {
                console.error('❌ 错误:', error);
                document.getElementById('apiStatus').textContent = `❌ ${error.message}`;
            }
        }

        // 颜色映射
        function getColor(colorName) {
            const colorMap = {
                'blank': '#d1d5db',
                'green': '#10b981',
                'yellow': '#f59e0b',
                'red': '#ef4444'
            };
            return colorMap[colorName] || '#9ca3af';
        }

        // 页面加载时执行
        window.addEventListener('load', () => {
            console.log('🚀 页面已加载');
            loadAndRenderChart();
        });

        // 窗口大小改变时重新调整图表
        window.addEventListener('resize', () => {
            chart.resize();
        });
    </script>
</body>
</html>
