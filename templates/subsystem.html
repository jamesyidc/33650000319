<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subsystem_name }} - 交易副系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            color: #666;
            font-size: 16px;
        }
        
        .status-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .status-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .status-item.green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        
        .status-item.orange {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }
        
        .status-item.red {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        
        .status-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .status-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .control-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .control-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .signals-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        
        .signal-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
        }
        
        .signal-card.executed {
            border-left-color: #10b981;
            opacity: 0.7;
        }
        
        .signal-card.failed {
            border-left-color: #ef4444;
        }
        
        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .signal-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .signal-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .badge-pending {
            background: #fef3c7;
            color: #d97706;
        }
        
        .badge-executed {
            background: #d1fae5;
            color: #059669;
        }
        
        .badge-failed {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .signal-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 14px;
            color: #333;
            font-weight: 600;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #10b981;
        }
        
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🤖 {{ subsystem_name }}</h1>
            <p class="subtitle">副系统ID: {{ subsystem_id }} | 独立执行信号分发系统的交易信号</p>
        </div>
        
        <!-- 状态面板 -->
        <div class="status-panel">
            <h2 class="section-title">📊 实时状态</h2>
            <div class="status-grid">
                <div class="status-item" id="statusEnabled">
                    <div class="status-value" id="enabledStatus">-</div>
                    <div class="status-label">副系统状态</div>
                </div>
                <div class="status-item orange">
                    <div class="status-value" id="pendingCount">0</div>
                    <div class="status-label">待执行信号</div>
                </div>
                <div class="status-item green">
                    <div class="status-value" id="executedCount">0</div>
                    <div class="status-label">已执行信号</div>
                </div>
                <div class="status-item red">
                    <div class="status-value" id="failedCount">0</div>
                    <div class="status-label">失败信号</div>
                </div>
                <div class="status-item">
                    <div class="status-value" id="totalPosition">0U</div>
                    <div class="status-label">当前总仓位</div>
                </div>
                <div class="status-item">
                    <div class="status-value" id="positionLimit">{{ max_total_position }}U</div>
                    <div class="status-label">总仓位上限</div>
                </div>
            </div>
        </div>
        
        <!-- 控制面板 -->
        <div class="control-panel">
            <h2 class="section-title">🎛️ 控制面板</h2>
            <div class="control-buttons">
                <label class="switch">
                    <input type="checkbox" id="enableSwitch" onchange="toggleSubsystem()">
                    <span class="slider"></span>
                </label>
                <span style="line-height: 34px; margin-left: 10px;" id="switchLabel">副系统开关</span>
                
                <button class="btn btn-primary" onclick="refreshData()">🔄 刷新数据</button>
                <button class="btn btn-success" onclick="retryFailed()">🔁 重试失败</button>
                <button class="btn btn-danger" onclick="clearFailed()">🗑️ 清除失败记录</button>
            </div>
        </div>
        
        <!-- 待执行信号 -->
        <div class="signals-container">
            <h2 class="section-title">⏳ 待执行信号</h2>
            <div id="pendingSignals">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <!-- 已执行信号 -->
        <div class="signals-container">
            <h2 class="section-title">✅ 已执行信号（最近10条）</h2>
            <div id="executedSignals">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <!-- 失败信号 -->
        <div class="signals-container">
            <h2 class="section-title">❌ 失败信号</h2>
            <div id="failedSignals">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    
    <script>
        const SUBSYSTEM_ID = '{{ subsystem_id }}';
        const API_BASE = '/api/subsystem/' + SUBSYSTEM_ID;
        
        // 加载数据
        async function loadData() {
            try {
                // 加载配置和状态
                const statusResp = await fetch(API_BASE + '/status');
                const statusData = await statusResp.json();
                
                updateStatus(statusData);
                
                // 加载待执行信号
                const pendingResp = await fetch(API_BASE + '/pending-signals');
                const pendingData = await pendingResp.json();
                renderPendingSignals(pendingData.signals || []);
                
                // 加载已执行信号
                const executedResp = await fetch(API_BASE + '/executed-signals');
                const executedData = await executedResp.json();
                renderExecutedSignals(executedData.signals || []);
                
                // 加载失败信号
                const failedResp = await fetch(API_BASE + '/failed-signals');
                const failedData = await failedResp.json();
                renderFailedSignals(failedData.signals || []);
                
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }
        
        // 更新状态显示
        function updateStatus(data) {
            document.getElementById('enabledStatus').textContent = data.enabled ? '✅ 运行中' : '⏸️ 已停止';
            document.getElementById('enableSwitch').checked = data.enabled;
            document.getElementById('statusEnabled').className = data.enabled ? 'status-item green' : 'status-item red';
            
            document.getElementById('pendingCount').textContent = data.pending_count || 0;
            document.getElementById('executedCount').textContent = data.executed_count || 0;
            document.getElementById('failedCount').textContent = data.failed_count || 0;
            document.getElementById('totalPosition').textContent = (data.total_position || 0).toFixed(2) + 'U';
        }
        
        // 渲染待执行信号
        function renderPendingSignals(signals) {
            const container = document.getElementById('pendingSignals');
            
            if (signals.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>暂无待执行信号</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = signals.map(signal => `
                <div class="signal-card">
                    <div class="signal-header">
                        <div class="signal-title">${signal.signal_type || signal.model_name}</div>
                        <span class="signal-badge badge-pending">⏳ 待执行</span>
                    </div>
                    <div class="signal-info">
                        <div class="info-item">
                            <span class="info-label">🕐 触发时间</span>
                            <span class="info-value">${new Date(signal.trigger_time).toLocaleString('zh-CN')}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">📊 交易方向</span>
                            <span class="info-value">${signal.direction === 'long' ? '做多' : '做空'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">🔢 交易对数量</span>
                            <span class="info-value">${signal.trading_params?.symbols_count || 0}个</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">⚙️ 每币仓位</span>
                            <span class="info-value">${signal.trading_params?.position_per_symbol || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">📈 杠杆倍数</span>
                            <span class="info-value">${signal.trading_params?.leverage || 'N/A'}倍</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">💰 单币上限</span>
                            <span class="info-value">${signal.trading_params?.max_position_per_symbol || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">🎯 市场主导</span>
                            <span class="info-value">${signal.market_trend || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">🔍 入场条件</span>
                            <span class="info-value">${signal.entry_condition ? (signal.entry_condition.met ? '✅ 已满足' : '⏳ 待满足') : '❌ 无检查'}</span>
                        </div>
                        ${signal.entry_condition?.velocity !== undefined ? `
                        <div class="info-item">
                            <span class="info-label">📈 5分钟涨速</span>
                            <span class="info-value">${signal.entry_condition.velocity?.toFixed(2) || 'N/A'}%</span>
                        </div>
                        ` : ''}
                        ${signal.entry_condition?.btc_change !== undefined && signal.entry_condition?.btc_change !== null ? `
                        <div class="info-item">
                            <span class="info-label">₿ BTC涨跌幅</span>
                            <span class="info-value" style="color: ${signal.entry_condition.btc_change >= 0 ? '#10b981' : '#ef4444'}">${signal.entry_condition.btc_change >= 0 ? '+' : ''}${signal.entry_condition.btc_change?.toFixed(2)}%</span>
                        </div>
                        ` : ''}
                        ${signal.entry_condition?.after_cutoff !== undefined ? `
                        <div class="info-item">
                            <span class="info-label">⏰ 02:30后新条件</span>
                            <span class="info-value">${signal.entry_condition.after_cutoff ? '✅ 生效' : '❌ 未生效'}</span>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        // 渲染已执行信号
        function renderExecutedSignals(signals) {
            const container = document.getElementById('executedSignals');
            
            if (signals.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>暂无执行记录</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = signals.slice(0, 10).map(record => `
                <div class="signal-card executed">
                    <div class="signal-header">
                        <div class="signal-title">信号 ${record.signal_id}</div>
                        <span class="signal-badge badge-executed">✅ 已执行</span>
                    </div>
                    <div class="signal-info">
                        <div class="info-item">
                            <span class="info-label">执行时间</span>
                            <span class="info-value">${new Date(record.execution_time).toLocaleString('zh-CN')}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">交易方向</span>
                            <span class="info-value">${record.direction === 'long' ? '📈 做多' : '📉 做空'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">订单数量</span>
                            <span class="info-value">${record.orders?.length || 0} 个</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">状态</span>
                            <span class="info-value">${record.status}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 渲染失败信号
        function renderFailedSignals(signals) {
            const container = document.getElementById('failedSignals');
            
            if (signals.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✨</div>
                        <p>太好了！没有失败信号</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = signals.map(record => `
                <div class="signal-card failed">
                    <div class="signal-header">
                        <div class="signal-title">信号 ${record.signal_id}</div>
                        <span class="signal-badge badge-failed">❌ 失败</span>
                    </div>
                    <div class="signal-info">
                        <div class="info-item">
                            <span class="info-label">失败时间</span>
                            <span class="info-value">${new Date(record.failed_time).toLocaleString('zh-CN')}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">重试次数</span>
                            <span class="info-value">${record.retry_count || 0} 次</span>
                        </div>
                        <div class="info-item" style="grid-column: 1 / -1;">
                            <span class="info-label">错误信息</span>
                            <span class="info-value" style="color: #ef4444;">${record.error}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 切换副系统开关
        async function toggleSubsystem() {
            const enabled = document.getElementById('enableSwitch').checked;
            
            try {
                const resp = await fetch(API_BASE + '/toggle', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({enabled})
                });
                
                const result = await resp.json();
                if (result.success) {
                    alert(enabled ? '✅ 副系统已启用' : '⏸️ 副系统已停止');
                    loadData();
                } else {
                    alert('❌ 操作失败: ' + result.message);
                }
            } catch (error) {
                alert('❌ 操作失败: ' + error.message);
            }
        }
        
        // 刷新数据
        function refreshData() {
            loadData();
        }
        
        // 重试失败信号
        async function retryFailed() {
            if (!confirm('确认重试所有失败的信号？')) return;
            
            try {
                const resp = await fetch(API_BASE + '/retry-failed', {method: 'POST'});
                const result = await resp.json();
                alert(result.message || '✅ 重试完成');
                loadData();
            } catch (error) {
                alert('❌ 重试失败: ' + error.message);
            }
        }
        
        // 清除失败记录
        async function clearFailed() {
            if (!confirm('确认清除所有失败记录？此操作不可撤销！')) return;
            
            try {
                const resp = await fetch(API_BASE + '/clear-failed', {method: 'POST'});
                const result = await resp.json();
                alert(result.message || '✅ 已清除');
                loadData();
            } catch (error) {
                alert('❌ 清除失败: ' + error.message);
            }
        }
        
        // 初始加载
        loadData();
        
        // 自动刷新（每30秒）
        setInterval(loadData, 30000);
    </script>
</body>
</html>
