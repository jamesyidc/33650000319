<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECharts Line Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { margin: 20px; font-family: sans-serif; }
        #chart { width: 100%; height: 600px; border: 1px solid #ccc; }
        .info { margin: 20px 0; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>ECharts Line Style Debug</h1>
    <div class="info">
        <p><strong>测试目的：</strong>验证lineStyle配置是否生效</p>
        <p><strong>预期效果：</strong>应该看到蓝色线条和蓝色填充区域</p>
    </div>
    <div id="chart"></div>
    
    <script>
        console.log('🚀 开始初始化图表...');
        
        // 模拟真实数据
        const times = [];
        const changes = [];
        for (let i = 0; i < 100; i++) {
            const hour = Math.floor(i / 6);
            const minute = (i % 6) * 10;
            times.push(`${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`);
            changes.push(-50 + Math.random() * 30 - i * 0.5); // 模拟下跌趋势
        }
        
        console.log('📊 数据准备完成:', {times: times.length, changes: changes.length});
        console.log('📊 Changes示例:', changes.slice(0, 5));
        
        const chart = echarts.init(document.getElementById('chart'));
        
        const option = {
            title: {
                text: '27币涨跌幅之和 - Debug',
                left: 'center'
            },
            tooltip: {
                trigger: 'axis'
            },
            xAxis: {
                type: 'category',
                data: times,
                boundaryGap: false
            },
            yAxis: [{
                type: 'value',
                name: '涨跌幅(%)',
                position: 'left',
                axisLabel: {
                    formatter: '{value}%'
                }
            }],
            series: [{
                name: '27币涨跌幅之和',
                type: 'line',
                yAxisIndex: 0,
                smooth: true,
                data: changes,
                lineStyle: {
                    color: '#3B82F6',
                    width: 3  // 加粗线条，更明显
                },
                areaStyle: {
                    color: {
                        type: 'linear',
                        x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [
                            { offset: 0, color: 'rgba(59, 130, 246, 0.5)' },
                            { offset: 1, color: 'rgba(59, 130, 246, 0.1)' }
                        ]
                    }
                },
                emphasis: {
                    focus: 'series'
                }
            }]
        };
        
        console.log('📊 配置对象:', JSON.stringify(option, null, 2));
        
        chart.setOption(option);
        
        console.log('✅ setOption 完成');
        
        // 3秒后检查图表状态
        setTimeout(() => {
            const seriesModel = chart.getModel().getSeries()[0];
            console.log('🔍 3秒后检查:');
            console.log('  - Series名称:', seriesModel.name);
            console.log('  - 数据长度:', seriesModel.getData().count());
            console.log('  - lineStyle:', seriesModel.get('lineStyle'));
            console.log('  - areaStyle:', seriesModel.get('areaStyle'));
        }, 3000);
    </script>
</body>
</html>
