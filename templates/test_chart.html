<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>图表测试</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div id="testChart" style="width: 100%; height: 500px; border: 1px solid #ccc;"></div>
    
    <script>
        console.log('🎯 开始测试...');
        
        // 初始化图表
        const chart = echarts.init(document.getElementById('testChart'));
        
        // 获取数据并绘制
        fetch('/api/coin-change-tracker/history?limit=100')
            .then(res => res.json())
            .then(result => {
                console.log('✅ API返回:', result);
                
                if (result.success && result.data && result.data.length > 0) {
                    const data = result.data;
                    
                    // 提取时间和涨跌幅
                    const times = data.map(d => d.beijing_time.split(' ')[1]);
                    const changes = data.map(d => d.total_change);
                    
                    console.log('📊 数据处理完成:');
                    console.log('  时间点数量:', times.length);
                    console.log('  涨跌幅数量:', changes.length);
                    console.log('  前5个时间:', times.slice(0, 5));
                    console.log('  前5个涨跌幅:', changes.slice(0, 5));
                    console.log('  后5个涨跌幅:', changes.slice(-5));
                    
                    // 设置图表选项
                    const option = {
                        title: {
                            text: '27币涨跌幅之和 - 测试'
                        },
                        tooltip: {
                            trigger: 'axis'
                        },
                        xAxis: {
                            type: 'category',
                            data: times
                        },
                        yAxis: {
                            type: 'value',
                            name: '涨跌幅 (%)'
                        },
                        series: [{
                            name: '27币涨跌幅之和',
                            type: 'line',
                            smooth: true,
                            data: changes,
                            lineStyle: {
                                color: '#3B82F6',
                                width: 2
                            },
                            areaStyle: {
                                color: 'rgba(59, 130, 246, 0.3)'
                            }
                        }]
                    };
                    
                    console.log('📈 设置图表选项...');
                    chart.setOption(option);
                    console.log('✅ 图表渲染完成!');
                } else {
                    console.error('❌ 数据格式错误或无数据');
                }
            })
            .catch(error => {
                console.error('❌ 请求失败:', error);
            });
    </script>
</body>
</html>
