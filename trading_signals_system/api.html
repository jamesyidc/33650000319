<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易信号分发系统 - JS API 调用页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .output pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            margin: 5px;
        }

        .status-online {
            background: #38ef7d;
            color: #1e1e1e;
        }

        .status-offline {
            background: #f45c43;
            color: white;
        }

        .signal-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
        }

        .signal-item.long {
            border-left-color: #38ef7d;
        }

        .signal-item.short {
            border-left-color: #f45c43;
        }

        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .signal-title {
            font-weight: bold;
            color: #333;
        }

        .signal-time {
            color: #999;
            font-size: 12px;
        }

        .signal-data {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .input-group {
            margin: 15px 0;
        }

        .input-group label {
            display: block;
            color: #666;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .polling-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .polling-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
        }

        .polling-indicator.active {
            background: #38ef7d;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }

        .log-time {
            color: #888;
        }

        .log-info {
            color: #4fc3f7;
        }

        .log-success {
            color: #81c784;
        }

        .log-error {
            color: #e57373;
        }

        .log-warning {
            color: #ffb74d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔌 交易信号分发系统 - JS API 调用页面</h1>
            <p class="subtitle">纯JavaScript接口 | 主副系统通信 | 实时信号监控</p>
        </div>

        <div class="grid">
            <!-- 系统状态 -->
            <div class="card">
                <h2>📊 系统状态</h2>
                <button class="btn" onclick="checkStatus()">检查状态</button>
                <button class="btn btn-success" onclick="startAutoPolling()">启动自动轮询</button>
                <button class="btn btn-danger" onclick="stopAutoPolling()">停止轮询</button>
                
                <div class="polling-status">
                    <div class="polling-indicator" id="pollingIndicator"></div>
                    <span id="pollingStatus">轮询已停止</span>
                </div>

                <div id="statusOutput" class="output">
                    <pre>等待查询...</pre>
                </div>
            </div>

            <!-- 待执行信号 -->
            <div class="card">
                <h2>📋 待执行信号队列</h2>
                <button class="btn" onclick="loadPendingSignals()">刷新队列</button>
                <button class="btn btn-success" onclick="executeAllSignals()">执行所有</button>
                
                <div id="pendingOutput" class="output">
                    <pre>等待加载...</pre>
                </div>
            </div>

            <!-- 手动执行 -->
            <div class="card">
                <h2>▶️ 手动执行信号</h2>
                <div class="input-group">
                    <label>模型ID:</label>
                    <input type="text" id="executeModelId" placeholder="例如: model_1">
                </div>
                <div class="input-group">
                    <label>触发时间:</label>
                    <input type="text" id="executeTriggerTime" placeholder="2026-03-08 02:30:15">
                </div>
                <div class="input-group">
                    <label>执行子系统:</label>
                    <input type="text" id="executeSubsystem" value="main_trading_system">
                </div>
                <button class="btn" onclick="executeSignalManually()">执行</button>
                
                <div id="executeOutput" class="output">
                    <pre>等待执行...</pre>
                </div>
            </div>

            <!-- 取消信号 -->
            <div class="card">
                <h2>❌ 取消信号</h2>
                <div class="input-group">
                    <label>模型ID:</label>
                    <input type="text" id="cancelModelId" placeholder="例如: model_1">
                </div>
                <div class="input-group">
                    <label>触发时间:</label>
                    <input type="text" id="cancelTriggerTime" placeholder="2026-03-08 02:30:15">
                </div>
                <div class="input-group">
                    <label>取消原因:</label>
                    <input type="text" id="cancelReason" placeholder="市场条件变化">
                </div>
                <button class="btn btn-danger" onclick="cancelSignal()">取消</button>
                
                <div id="cancelOutput" class="output">
                    <pre>等待操作...</pre>
                </div>
            </div>

            <!-- 历史信号 -->
            <div class="card">
                <h2>📜 历史信号</h2>
                <div class="input-group">
                    <label>日期筛选:</label>
                    <input type="date" id="historyDate">
                </div>
                <div class="input-group">
                    <label>数量限制:</label>
                    <input type="number" id="historyLimit" value="20" min="1" max="100">
                </div>
                <button class="btn" onclick="loadHistory()">查询</button>
                
                <div id="historyOutput" class="output">
                    <pre>等待查询...</pre>
                </div>
            </div>

            <!-- 执行结果上报 -->
            <div class="card">
                <h2>📤 上报执行结果</h2>
                <div class="input-group">
                    <label>模型ID:</label>
                    <input type="text" id="reportModelId" placeholder="model_1">
                </div>
                <div class="input-group">
                    <label>触发时间:</label>
                    <input type="text" id="reportTriggerTime" placeholder="2026-03-08 02:30:15">
                </div>
                <div class="input-group">
                    <label>执行结果JSON:</label>
                    <textarea id="reportResult" style="width:100%; height:80px; font-family:monospace; padding:8px;">{
  "success": true,
  "executed_coins": [],
  "total_cost": 0
}</textarea>
                </div>
                <button class="btn" onclick="reportExecution()">上报</button>
                
                <div id="reportOutput" class="output">
                    <pre>等待上报...</pre>
                </div>
            </div>
        </div>

        <!-- 实时日志 -->
        <div class="card" style="grid-column: 1 / -1;">
            <h2>📝 实时日志</h2>
            <button class="btn btn-small" onclick="clearLog()">清空日志</button>
            <div id="logOutput" class="output" style="max-height: 300px;">
                <div class="log-entry">
                    <span class="log-time">[等待操作]</span>
                    <span class="log-info">系统就绪</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入API客户端库 -->
    <script src="/static/trading-signals-system/js/api-client.js"></script>

    <script>
        // 初始化API客户端
        const api = new TradingSignalsAPI({
            baseURL: '/api/trading-signals-system',
            timeout: 10000
        });

        let pollingTimer = null;

        // 日志记录
        function log(message, type = 'info') {
            const logDiv = document.getElementById('logOutput');
            const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="log-${type}">${message}</span>
            `;
            logDiv.insertBefore(entry, logDiv.firstChild);
            
            // 限制日志条数
            if (logDiv.children.length > 100) {
                logDiv.removeChild(logDiv.lastChild);
            }
        }

        function clearLog() {
            document.getElementById('logOutput').innerHTML = '';
            log('日志已清空');
        }

        // 检查系统状态
        async function checkStatus() {
            try {
                log('正在检查系统状态...', 'info');
                const response = await api.getStatus();
                document.getElementById('statusOutput').innerHTML = 
                    `<pre>${JSON.stringify(response, null, 2)}</pre>`;
                log('✅ 系统状态查询成功', 'success');
            } catch (error) {
                document.getElementById('statusOutput').innerHTML = 
                    `<pre class="log-error">错误: ${error.message}</pre>`;
                log(`❌ 查询失败: ${error.message}`, 'error');
            }
        }

        // 加载待执行信号
        async function loadPendingSignals() {
            try {
                log('正在加载待执行信号...', 'info');
                const response = await api.getPending();
                
                let html = `<div class="log-info">待执行: ${response.pending_count} | 今日: ${response.today_count} | 历史: ${response.history_count}</div>`;
                
                if (response.signals.length > 0) {
                    response.signals.forEach(signal => {
                        const dirClass = signal.direction === 'long' ? 'long' : 'short';
                        html += `
                            <div class="signal-item ${dirClass}">
                                <div class="signal-header">
                                    <span class="signal-title">${signal.model_name}</span>
                                    <span class="signal-time">${signal.trigger_time}</span>
                                </div>
                                <div class="signal-data">
                                    方向: ${signal.direction === 'long' ? '做多' : '做空'} | 
                                    正比例: ${signal.positive_ratio}% | 
                                    速度: ${signal.velocity_1_5min}%
                                </div>
                            </div>
                        `;
                    });
                } else {
                    html += '<pre>无待执行信号</pre>';
                }
                
                document.getElementById('pendingOutput').innerHTML = html;
                log(`✅ 加载成功，发现 ${response.pending_count} 个待执行信号`, 'success');
            } catch (error) {
                document.getElementById('pendingOutput').innerHTML = 
                    `<pre class="log-error">错误: ${error.message}</pre>`;
                log(`❌ 加载失败: ${error.message}`, 'error');
            }
        }

        // 手动执行信号
        async function executeSignalManually() {
            try {
                const modelId = document.getElementById('executeModelId').value;
                const triggerTime = document.getElementById('executeTriggerTime').value;
                const subsystem = document.getElementById('executeSubsystem').value;

                if (!modelId || !triggerTime) {
                    throw new Error('请填写模型ID和触发时间');
                }

                log(`执行信号: ${modelId} @ ${triggerTime}`, 'info');

                const response = await api.execute({
                    model_id: modelId,
                    trigger_time: triggerTime,
                    execution_subsystem: subsystem,
                    execution_account: 'manual',
                    execution_params: {
                        notes: '手动执行'
                    }
                });

                document.getElementById('executeOutput').innerHTML = 
                    `<pre>${JSON.stringify(response, null, 2)}</pre>`;
                log(`✅ 执行成功: ${response.message}`, 'success');
            } catch (error) {
                document.getElementById('executeOutput').innerHTML = 
                    `<pre class="log-error">错误: ${error.message}</pre>`;
                log(`❌ 执行失败: ${error.message}`, 'error');
            }
        }

        // 取消信号
        async function cancelSignal() {
            try {
                const modelId = document.getElementById('cancelModelId').value;
                const triggerTime = document.getElementById('cancelTriggerTime').value;
                const reason = document.getElementById('cancelReason').value || '手动取消';

                if (!modelId || !triggerTime) {
                    throw new Error('请填写模型ID和触发时间');
                }

                log(`取消信号: ${modelId} @ ${triggerTime}`, 'warning');

                const response = await api.cancel({
                    model_id: modelId,
                    trigger_time: triggerTime,
                    reason: reason
                });

                document.getElementById('cancelOutput').innerHTML = 
                    `<pre>${JSON.stringify(response, null, 2)}</pre>`;
                log(`✅ 取消成功: ${response.message}`, 'success');
            } catch (error) {
                document.getElementById('cancelOutput').innerHTML = 
                    `<pre class="log-error">错误: ${error.message}</pre>`;
                log(`❌ 取消失败: ${error.message}`, 'error');
            }
        }

        // 加载历史信号
        async function loadHistory() {
            try {
                const date = document.getElementById('historyDate').value;
                const limit = document.getElementById('historyLimit').value;

                log('正在加载历史信号...', 'info');

                const params = {};
                if (date) params.date = date;
                if (limit) params.limit = parseInt(limit);

                const response = await api.getHistory(params);
                document.getElementById('historyOutput').innerHTML = 
                    `<pre>${JSON.stringify(response, null, 2)}</pre>`;
                log(`✅ 加载成功，共 ${response.count} 条记录`, 'success');
            } catch (error) {
                document.getElementById('historyOutput').innerHTML = 
                    `<pre class="log-error">错误: ${error.message}</pre>`;
                log(`❌ 加载失败: ${error.message}`, 'error');
            }
        }

        // 上报执行结果
        async function reportExecution() {
            try {
                const modelId = document.getElementById('reportModelId').value;
                const triggerTime = document.getElementById('reportTriggerTime').value;
                const resultJson = document.getElementById('reportResult').value;

                if (!modelId || !triggerTime) {
                    throw new Error('请填写模型ID和触发时间');
                }

                const executionResult = JSON.parse(resultJson);

                log(`上报结果: ${modelId} @ ${triggerTime}`, 'info');

                const response = await api.reportExecution({
                    model_id: modelId,
                    trigger_time: triggerTime,
                    execution_result: executionResult
                });

                document.getElementById('reportOutput').innerHTML = 
                    `<pre>${JSON.stringify(response, null, 2)}</pre>`;
                log(`✅ 上报成功: ${response.message}`, 'success');
            } catch (error) {
                document.getElementById('reportOutput').innerHTML = 
                    `<pre class="log-error">错误: ${error.message}</pre>`;
                log(`❌ 上报失败: ${error.message}`, 'error');
            }
        }

        // 启动自动轮询
        function startAutoPolling() {
            if (pollingTimer) {
                log('⚠️ 轮询已在运行中', 'warning');
                return;
            }

            pollingTimer = api.startPolling((newSignals, response) => {
                log(`🔔 发现 ${newSignals.length} 个新信号！`, 'success');
                
                // 自动刷新待执行信号列表
                loadPendingSignals();

                // 可以在这里添加自动执行逻辑
                // 例如: executeAllSignals();
            }, 30000); // 30秒轮询一次

            document.getElementById('pollingIndicator').classList.add('active');
            document.getElementById('pollingStatus').textContent = '轮询运行中 (30秒/次)';
            log('✅ 自动轮询已启动', 'success');
        }

        // 停止自动轮询
        function stopAutoPolling() {
            if (!pollingTimer) {
                log('⚠️ 轮询未运行', 'warning');
                return;
            }

            api.stopPolling(pollingTimer);
            pollingTimer = null;

            document.getElementById('pollingIndicator').classList.remove('active');
            document.getElementById('pollingStatus').textContent = '轮询已停止';
            log('🛑 自动轮询已停止', 'warning');
        }

        // 执行所有待执行信号
        async function executeAllSignals() {
            try {
                log('正在执行所有待执行信号...', 'info');
                const response = await api.getPending();
                
                if (response.pending_count === 0) {
                    log('⚠️ 没有待执行信号', 'warning');
                    return;
                }

                const validSignals = api.filterValidSignals(response.signals);
                
                log(`开始批量执行 ${validSignals.length} 个信号`, 'info');

                const results = await api.batchExecute(validSignals, {
                    execution_subsystem: 'main_trading_system',
                    execution_account: 'auto_batch',
                    execution_params: {
                        notes: '批量自动执行'
                    }
                });

                const successCount = results.filter(r => r.success).length;
                const failCount = results.length - successCount;

                log(`✅ 批量执行完成: 成功 ${successCount}, 失败 ${failCount}`, 'success');

                // 刷新列表
                loadPendingSignals();
            } catch (error) {
                log(`❌ 批量执行失败: ${error.message}`, 'error');
            }
        }

        // 页面加载时自动查询状态
        window.onload = function() {
            log('🚀 JS API调用页面已加载', 'success');
            checkStatus();
            loadPendingSignals();
        };

        // 页面卸载时停止轮询
        window.onbeforeunload = function() {
            if (pollingTimer) {
                api.stopAllPolling();
            }
        };
    </script>
</body>
</html>
